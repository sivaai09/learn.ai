<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlgoViz — 33 Algorithm Visualizations</title>
<meta name="description" content="Interactive algorithm visualizations. Sorting, graphs, trees, dynamic programming, and more.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #E8E8E8; --surface: #FFFFFF; --surface2: #F4F4F4; --surface3: #EBEBEB;
  --border: #D4D4D4; --border-active: #AAAAAA; --border-subtle: #E0E0E0;
  --text: #1A1A1A; --text-muted: #6B6B6B; --text-dim: #9A9A9A;
  --accent: #1A1A1A; --accent-glow: rgba(26,26,26,0.06);
  --accent-subtle: rgba(26,26,26,0.03);
  --success: #2D8A56; --success-glow: rgba(45,138,86,0.08);
  --warning: #8A6B2D; --warning-glow: rgba(138,107,45,0.08);
  --danger: #8A2D2D; --danger-glow: rgba(138,45,45,0.08);
  --radius: 6px; --radius-sm: 3px; --radius-lg: 8px;
  --serif: 'Instrument Serif', Georgia, serif;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', monospace;
}

body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased; overflow-x: hidden;
}

/* Header — typographic, not decorative */
.pg-header {
  padding: 48px 40px 36px; text-align: center;
}
.pg-header h1 {
  font-family: var(--serif); font-size: 36px; font-weight: 400;
  letter-spacing: -0.02em; color: var(--text); margin-bottom: 6px;
  font-style: italic;
}
.pg-header .tagline {
  font-size: 14px; color: var(--text-muted); font-weight: 400;
  letter-spacing: 0.01em;
}
.pg-header .tagline strong { color: var(--text); font-weight: 500; }
.pg-count-badge {
  font-family: var(--mono); font-size: 13px; font-weight: 400;
  color: var(--text-dim); margin-left: 4px; font-style: normal;
}

/* Layout */
.pg-container {
  max-width: 1360px; margin: 0 auto; padding: 0 40px 64px;
  display: grid; grid-template-columns: 280px 1fr; gap: 32px;
  min-height: calc(100vh - 140px);
}
.pg-sidebar { display: flex; flex-direction: column; gap: 20px; }
.pg-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px;
}
.pg-panel-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.pg-panel-count { font-size: 10px; font-weight: 500; color: var(--text-dim); font-family: var(--mono); }

/* Search — subtle, integrated */
.pg-search {
  width: 100%; padding: 8px 12px;
  background: var(--surface2); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 13px; font-family: var(--font); outline: none; transition: border-color 0.15s;
}
.pg-search:focus { border-color: var(--border-active); }
.pg-search::placeholder { color: var(--text-dim); }
.pg-search-wrap { margin-bottom: 16px; }

/* Category filters — text only, no emoji */
.pg-cat-filters { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; }
.pg-cat-pill {
  font-size: 11px; font-weight: 500; padding: 4px 10px;
  border-radius: 3px; cursor: pointer; transition: all 0.15s;
  border: 1px solid transparent; background: transparent; color: var(--text-dim);
}
.pg-cat-pill:hover { color: var(--text-muted); background: var(--surface2); }
.pg-cat-pill.active {
  background: var(--text); color: var(--surface); border-color: var(--text);
}

/* Algorithm list — clean, no emoji, generous spacing */
.pg-algo-list {
  list-style: none; display: flex; flex-direction: column; gap: 0;
  max-height: calc(100vh - 440px); overflow-y: auto; scrollbar-width: thin;
}
.pg-algo-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 8px; border-bottom: 1px solid var(--border-subtle);
  cursor: pointer; transition: background 0.1s;
  font-size: 13px; font-weight: 400; color: var(--text-muted);
}
.pg-algo-item:last-child { border-bottom: none; }
.pg-algo-item:hover { background: var(--surface2); color: var(--text); }
.pg-algo-item.active { background: var(--surface2); color: var(--text); }
.pg-algo-item .algo-name { flex: 1; line-height: 1.3; }
.pg-algo-item .algo-diff {
  font-size: 9px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-dim); flex-shrink: 0;
}

.pg-empty-state { padding: 24px; text-align: center; color: var(--text-dim); font-size: 13px; }

/* Info panel */
.pg-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.pg-info-item { padding: 8px 0; border-bottom: 1px solid var(--border-subtle); }
.pg-info-item .info-label {
  font-size: 9px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 2px;
}
.pg-info-item .info-value { font-size: 13px; font-weight: 500; color: var(--text); font-family: var(--mono); }
.pg-info-item.full { grid-column: 1 / -1; }
.pg-info-item .info-value.desc {
  font-family: var(--font); font-weight: 400; font-size: 13px; line-height: 1.5; color: var(--text-muted);
}

/* Player — clean container */
.pg-player-wrap {
  display: flex; flex-direction: column;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden; min-height: 0;
}

/* Engine styles — player header, canvas, controls */
.av-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px; background: var(--surface);
  border-bottom: 1px solid var(--border-subtle); flex-shrink: 0;
}
.av-header h1 {
  font-size: 15px; font-weight: 600; letter-spacing: -0.01em; color: var(--text);
}
.av-meta { display: flex; gap: 8px; }
.av-badge {
  padding: 2px 8px; border-radius: 3px;
  font-size: 10px; font-weight: 500; color: var(--text-dim);
  background: var(--surface2); font-family: var(--mono); border: none;
}
.av-badge-accent { color: var(--text); background: var(--surface3); }

.av-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.av-canvas-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 16px; min-height: 300px; position: relative; background: var(--surface);
}
.av-canvas-wrap svg { width: 100%; height: 100%; max-width: 100%; max-height: 100%; }

/* Keyboard shortcut hints overlay (engine-generated) */
.av-kbd-hints {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px; padding: 6px 14px;
  background: rgba(26,26,26,0.8); border-radius: 6px;
  font-size: 11px; color: rgba(255,255,255,0.7); z-index: 10;
  backdrop-filter: blur(8px); pointer-events: none;
}
.av-kbd-hints kbd {
  background: rgba(255,255,255,0.15); padding: 1px 5px; border-radius: 3px;
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  color: #fff; margin-right: 2px;
}
@keyframes av-kbd-fadeout {
  from { opacity: 1; }
  to { opacity: 0; transform: translateX(-50%) translateY(4px); }
}
.av-kbd-fade { animation: av-kbd-fadeout 0.4s ease-out forwards; }

/* Actor transitions */
.av-actor { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.av-actor rect, .av-actor circle, .av-actor polygon {
  transition: fill 0.25s ease-out, stroke 0.25s ease-out, opacity 0.2s ease-out,
              x 0.3s cubic-bezier(0.4,0,0.2,1), y 0.3s cubic-bezier(0.4,0,0.2,1),
              cx 0.3s cubic-bezier(0.4,0,0.2,1), cy 0.3s cubic-bezier(0.4,0,0.2,1),
              width 0.3s cubic-bezier(0.4,0,0.2,1), height 0.3s cubic-bezier(0.4,0,0.2,1),
              filter 0.25s ease-out;
}
.av-actor text { transition: fill 0.25s ease-out, opacity 0.2s ease-out, x 0.3s cubic-bezier(0.4,0,0.2,1), y 0.3s cubic-bezier(0.4,0,0.2,1); }
.av-actor line { transition: stroke 0.25s ease-out, opacity 0.2s ease-out, x1 0.3s cubic-bezier(0.4,0,0.2,1), y1 0.3s cubic-bezier(0.4,0,0.2,1), x2 0.3s cubic-bezier(0.4,0,0.2,1), y2 0.3s cubic-bezier(0.4,0,0.2,1); }
.av-transition-instant .av-actor, .av-transition-instant .av-actor rect, .av-transition-instant .av-actor circle, .av-transition-instant .av-actor line, .av-transition-instant .av-actor polygon, .av-transition-instant .av-actor text { transition: none !important; }
.av-transition-swap .av-actor { transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
@keyframes av-enter { from { opacity: 0; } to { opacity: 1; } }
@keyframes av-exit { from { opacity: 1; } to { opacity: 0; } }
.av-entering { animation: av-enter 0.25s ease-out forwards; }
.av-exiting { animation: av-exit 0.2s ease-out forwards; pointer-events: none; }

/* Description bar */
.av-description {
  padding: 12px 24px; background: var(--surface);
  border-top: 1px solid var(--border-subtle); min-height: 48px;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.av-description[data-annotation="invariant"] { border-left: 2px solid var(--success); }
.av-description[data-annotation="warning"] { border-left: 2px solid var(--warning); }
.av-description[data-annotation="decision"] { border-left: 2px solid var(--accent); }
.av-description[data-annotation="boundary"] { border-left: 2px solid var(--danger); }
.av-description-step {
  font-size: 11px; color: var(--text-dim); font-weight: 500;
  white-space: nowrap; font-family: var(--mono);
  min-width: 30px; text-align: center;
}
.av-description-text { font-size: 13px; line-height: 1.5; font-weight: 400; color: var(--text); }
.av-description-text:empty::after {
  content: 'Press play or use arrow keys';
  color: var(--text-dim); font-style: italic;
}
.av-description-text .highlight { font-weight: 600; }
.av-description-text .warn { color: var(--warning); font-weight: 600; }
.av-description-text .success { color: var(--success); font-weight: 600; }
.av-description-text .danger { color: var(--danger); font-weight: 600; }
.av-annotation-badge {
  font-size: 9px; font-weight: 500; letter-spacing: 0.05em;
  padding: 2px 6px; border-radius: 3px; text-transform: uppercase;
  white-space: nowrap; font-family: var(--mono); color: var(--text-dim);
  background: var(--surface2);
}
.av-phase-badge {
  font-size: 9px; font-weight: 500; padding: 2px 6px; border-radius: 3px;
  text-transform: uppercase; white-space: nowrap; font-family: var(--mono);
  background: var(--surface2); color: var(--text-dim);
}

/* Controls — refined, minimal */
.av-controls {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 24px; background: var(--surface);
  border-top: 1px solid var(--border-subtle); flex-shrink: 0;
}
.av-btn {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  width: 32px; height: 32px; border-radius: var(--radius);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: all 0.15s; flex-shrink: 0;
}
.av-btn:hover { background: var(--surface2); color: var(--text); }
.av-btn:active { transform: scale(0.96); }
.av-btn.av-btn-play {
  width: 36px; height: 36px; background: var(--text); border-color: var(--text);
  border-radius: 50%; font-size: 14px; color: var(--surface);
}
.av-btn.av-btn-play:hover { opacity: 0.8; }
.av-timeline-wrap { flex: 1; position: relative; display: flex; align-items: center; }
.av-timeline {
  width: 100%; height: 3px; -webkit-appearance: none; appearance: none;
  background: var(--surface3); border-radius: 2px; outline: none; cursor: pointer;
}
.av-timeline::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  background: var(--text); border-radius: 50%; cursor: grab;
}
.av-timeline::-moz-range-thumb {
  width: 12px; height: 12px; background: var(--text);
  border-radius: 50%; border: none; cursor: grab;
}
.av-speed-group {
  display: flex; border: 1px solid var(--border); border-radius: var(--radius-sm);
  overflow: hidden; flex-shrink: 0;
}
.av-speed-seg {
  background: transparent; border: none; color: var(--text-dim);
  padding: 3px 7px; font-size: 11px; font-family: var(--mono); font-weight: 500;
  cursor: pointer; transition: all 0.12s; border-right: 1px solid var(--border);
}
.av-speed-seg:last-child { border-right: none; }
.av-speed-seg:hover { color: var(--text-muted); background: var(--surface2); }
.av-speed-seg.active { background: var(--text); color: var(--surface); }
.av-step-count {
  font-size: 11px; color: var(--text-dim); white-space: nowrap;
  min-width: 48px; text-align: right; font-family: var(--mono); font-weight: 500;
}
.av-phase-markers {
  position: absolute; top: 0; left: 8px; right: 8px; height: 100%;
  pointer-events: none; display: flex; align-items: center;
}
.av-phase-tick {
  position: absolute; width: 1px; height: 10px;
  background: var(--text-dim); opacity: 0.25; border-radius: 1px;
}

/* Keyboard shortcuts bar */
.pg-shortcuts {
  display: flex; justify-content: center; gap: 16px; padding: 8px 24px; flex-shrink: 0;
  border-top: 1px solid var(--border-subtle); background: var(--surface);
}
.pg-shortcut { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-dim); }
.pg-key {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 5px; font-size: 9px;
  font-family: var(--mono); font-weight: 500; color: var(--text-muted);
  min-width: 18px; text-align: center;
}

@media (max-width: 900px) {
  .pg-container { grid-template-columns: 1fr; padding: 0 16px 48px; gap: 16px; }
  .pg-header { padding: 32px 16px 24px; }
  .pg-header h1 { font-size: 28px; }
  .av-canvas-wrap { min-height: 280px; }
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-active); }
</style>
</head>
<body>

<header class="pg-header">
  <h1>AlgoViz <span class="pg-count-badge">33</span></h1>

</header>

<div class="pg-container">

      Select an algorithm to begin
    </div>
  </div>
</div>

","annotation":"explanation","narration":"<span class=\"success\">Yes, they are anagrams!</span> Every character count returned to zero, meaning both words have exactly the same characters. Time: <span class=\"highlight\">O(n)</span>, space: <span class=\"highlight\">O(1)</span> (26 letters max).","phase":"cleanup","actions":[{"type":"update","target":"f12","props":{"fill":"$success"}},{"type":"update","target":"f13","props":{"fill":"$success"}},{"type":"update","target":"f14","props":{"fill":"$success"}},{"type":"update","target":"f15","props":{"fill":"$success"}},{"type":"update","target":"f16","props":{"fill":"$success"}},{"type":"update","target":"f17","props":{"fill":"$success"}},{"type":"update","target":"a0","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"a1","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"a2","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"a3","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"a4","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"a5","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"b6","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"b7","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"b8","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"b9","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"b10","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"b11","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"status19","props":{"text":"Result: They ARE anagrams!"}}]}],"config":{"canvas":{"height":560}}},"avl-rotation":{"version":"1.0","metadata":{"algorithm":"avl_rotation","title":"AVL Tree: Right Rotation (Left-Left Case)","description":"Demonstrates how an AVL tree detects a left-left imbalance and fixes it with a single right rotation to restore balance.","category":"tree","difficulty":"advanced","complexity":{"time":"O(log n)","space":"O(1)"},"inputDescription":"Insert 30, 20, 10 into an empty BST → triggers LL imbalance at root"},"actors":[{"id":"n0","type":"node","x":500,"y":80,"value":30,"radius":25},{"id":"n1","type":"node","x":270,"y":180,"value":20,"radius":25},{"id":"n3","type":"node","x":155,"y":280,"value":10,"radius":25},{"id":"e2","type":"edge","source":"n0","target":"n1","directed":false},{"id":"e4","type":"edge","source":"n1","target":"n3","directed":false},{"id":"title5","type":"label","x":500,"y":30,"text":"AVL Tree: Right Rotation","fontSize":24,"fontWeight":"bold","anchor":"middle"},{"id":"status6","type":"label","x":500,"y":560,"text":"","fontSize":16,"anchor":"middle","fill":"$muted"},{"id":"lbf","type":"label","x":500,"y":500,"text":"Balance factors: height(left) - height(right)","fontSize":16,"fontWeight":"bold","anchor":"middle","fill":"$primary"}],"steps":[{"description":"An unbalanced BST: we inserted 30, then 20, then 10","annotation":"initialization","narration":"We built a BST by inserting <span class=\"highlight\">30</span>, then <span class=\"highlight\">20</span>, then <span class=\"highlight\">10</span>. Each new value went to the left, creating a \"left-leaning\" chain. This is <span class=\"warn\">not balanced</span> — the left side is much taller than the right.","phase":"setup","actions":[{"type":"update","target":"status6","props":{"text":"Unbalanced BST: 30 → 20 → 10 (left chain)"}}]},{"description":"What is a balance factor?","narration":"In an AVL tree, every node has a <span class=\"highlight\">balance factor</span>: the height of its left subtree minus the height of its right subtree. A node is <span class=\"success\">balanced</span> if its balance factor is -1, 0, or +1. If the balance factor is <span class=\"warn\">+2 or -2</span>, the tree needs fixing!","actions":[{"type":"update","target":"lbf","props":{"text":"Balance factor = height(left) - height(right)"}},{"type":"update","target":"status6","props":{"text":"AVL rule: balance factor must be -1, 0, or +1"}}]},{"description":"Check balance factor of node 10 (leaf): BF = 0","annotation":"invariant","narration":"Node <span class=\"highlight\">10</span> is a leaf — no children. Left height = 0, right height = 0, so balance factor = <span class=\"success\">0</span>. That is fine!","phase":"main-loop","actions":[{"type":"update","target":"n3","props":{"fill":"$success"}},{"type":"update","target":"status6","props":{"text":"Node 10: BF = 0 (balanced)"}}]},{"description":"Check balance factor of node 20: BF = +1 (left child 10, no right child)","annotation":"invariant","narration":"Node <span class=\"highlight\">20</span> has left child 10 (height 1) and no right child (height 0). Balance factor = 1 - 0 = <span class=\"success\">+1</span>. Still okay!","phase":"main-loop","actions":[{"type":"update","target":"n3","props":{"fill":"$default"}},{"type":"update","target":"n1","props":{"fill":"$success"}},{"type":"update","target":"status6","props":{"text":"Node 20: BF = +1 (balanced)"}}]},{"description":"Check balance factor of root 30: BF = +2 (IMBALANCED!)","annotation":"warning","narration":"Node <span class=\"warn\">30</span> has left subtree height 2 and right subtree height 0. Balance factor = 2 - 0 = <span class=\"warn\">+2</span>. That is <span class=\"warn\">too big!</span> The AVL rule says the maximum allowed is +1. We need a <span class=\"highlight\">rotation</span> to fix this!","phase":"main-loop","actions":[{"type":"update","target":"n1","props":{"fill":"$default"}},{"type":"update","target":"n0","props":{"fill":"$danger"}},{"type":"update","target":"status6","props":{"text":"Node 30: BF = +2 — VIOLATION! Needs rotation"}},{"type":"update","target":"lbf","props":{"text":"BF(30) = +2 — Left-Left case detected!"}}]},{"description":"This is a Left-Left case: imbalance at 30, heavy on the left-left path","narration":"The imbalance is at <span class=\"warn\">30</span>, and the heavy side goes left to <span class=\"highlight\">20</span>, then left again to <span class=\"highlight\">10</span>. This pattern is called the <span class=\"highlight\">Left-Left (LL) case</span>. The fix is a single <span class=\"highlight\">right rotation</span> at the imbalanced node (30).","actions":[{"type":"update","target":"n0","props":{"fill":"$danger"}},{"type":"update","target":"n1","props":{"fill":"$warning"}},{"type":"update","target":"n3","props":{"fill":"$warning"}},{"type":"update","target":"status6","props":{"text":"Left-Left case → fix with RIGHT rotation at 30"}}]},{"description":"Right rotation: 20 becomes the new root, 30 becomes 20's right child","narration":"Here is how a <span class=\"highlight\">right rotation</span> works: <span class=\"highlight\">20</span> moves up to become the new root. <span class=\"warn\">30</span> moves down to become the right child of 20. If 20 had a right child, it would become the left child of 30 (but here 20 has no right child). The result: a perfectly balanced tree!","actions":[{"type":"update","target":"n1","props":{"fill":"$primary"}},{"type":"update","target":"n3","props":{"fill":"$default"}},{"type":"update","target":"status6","props":{"text":"Right rotation: 20 moves up, 30 moves down"}}]},{"description":"Performing the right rotation...","actions":[{"type":"update","target":"n0","props":{"fill":"$danger"}},{"type":"update","target":"n1","props":{"fill":"$warning"}},{"type":"update","target":"n3","props":{"fill":"$warning"}},{"type":"update","target":"status6","props":{"text":"Rotating..."}}]},{"description":"After right rotation: 20 is the new root, with 10 and 30 as children","annotation":"explanation","narration":"<span class=\"success\">Rotation complete!</span> The tree is now balanced: <span class=\"success\">20</span> is the root, <span class=\"highlight\">10</span> is the left child, and <span class=\"highlight\">30</span> is the right child. Every node now has a balance factor of <span class=\"success\">0</span>.","phase":"main-loop","actions":[{"type":"update","target":"n0","props":{"opacity":0}},{"type":"update","target":"n1","props":{"opacity":0}},{"type":"update","target":"n3","props":{"opacity":0}},{"type":"update","target":"e2","props":{"opacity":0}},{"type":"update","target":"e4","props":{"opacity":0}},{"type":"create","actor":{"id":"nr20","type":"node","x":500,"y":80,"value":20,"radius":25,"fill":"$success"}},{"type":"create","actor":{"id":"nr10","type":"node","x":268,"y":180,"value":10,"radius":25,"fill":"$success"}},{"type":"create","actor":{"id":"nr30","type":"node","x":732,"y":180,"value":30,"radius":25,"fill":"$success"}},{"type":"create","actor":{"id":"ne1","type":"edge","source":"nr20","target":"nr10","directed":false}},{"type":"create","actor":{"id":"ne2","type":"edge","source":"nr20","target":"nr30","directed":false}},{"type":"update","target":"status6","props":{"text":"Rotation done! Balanced tree: BF = 0 everywhere"}},{"type":"update","target":"lbf","props":{"text":"BF(20)=0, BF(10)=0, BF(30)=0 — all balanced!"}}]},{"description":"Verify: all balance factors are now 0","annotation":"invariant","narration":"Let us verify: <span class=\"highlight\">10</span> is a leaf (BF=0). <span class=\"highlight\">30</span> is a leaf (BF=0). <span class=\"highlight\">20</span> has one child on each side, both height 1 (BF=0). <span class=\"success\">Every node is balanced!</span> The AVL property is restored.","phase":"main-loop","actions":[{"type":"update","target":"nr20","props":{"fill":"$primary"}},{"type":"update","target":"nr10","props":{"fill":"$primary"}},{"type":"update","target":"nr30","props":{"fill":"$primary"}},{"type":"update","target":"status6","props":{"text":"All nodes balanced: BF(10)=0, BF(20)=0, BF(30)=0"}}]},{"description":"AVL trees have 4 rotation cases: LL, RR, LR, RL","narration":"AVL trees use <span class=\"highlight\">4 types of rotations</span> to stay balanced: <span class=\"highlight\">Left-Left (LL)</span> → single right rotation (what we just did). <span class=\"highlight\">Right-Right (RR)</span> → single left rotation. <span class=\"highlight\">Left-Right (LR)</span> → left rotation on child, then right rotation on parent. <span class=\"highlight\">Right-Left (RL)</span> → right rotation on child, then left rotation on parent. Each rotation takes <span class=\"success\">O(1)</span> time!","actions":[{"type":"update","target":"nr20","props":{"fill":"$default"}},{"type":"update","target":"nr10","props":{"fill":"$default"}},{"type":"update","target":"nr30","props":{"fill":"$default"}},{"type":"update","target":"status6","props":{"text":"4 cases: LL→right, RR→left, LR→left+right, RL→right+left"}}]},{"description":"AVL rotation complete! Rotations keep the tree balanced in O(log n) height.","annotation":"explanation","narration":"<span class=\"success\">Summary:</span> AVL trees are BSTs that <span class=\"highlight\">automatically rebalance</span> after every insert or delete. By checking balance factors and performing rotations, the tree height stays at <span class=\"highlight\">O(log n)</span>. This means search, insert, and delete are all <span class=\"success\">O(log n)</span> guaranteed — much better than a regular BST that could become O(n) if values arrive in sorted order!","phase":"cleanup","actions":[{"type":"update","target":"nr20","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"nr10","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"nr30","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"status6","props":{"text":"AVL tree: O(log n) search, insert, delete — guaranteed!"}}]}]},"bellman-ford":{"version":"1.0","metadata":{"algorithm":"bellman_ford","title":"Bellman-Ford Algorithm","description":"Shortest paths from source with negative edge weights, showing V-1 passes of edge relaxation.","category":"graph","difficulty":"intermediate","complexity":{"time":"O(V*E)"," s — its root is the <span class=\"success\">largest of the small numbers</span>. The <span class=\"warn\">min-heap</span> stores the larger half — its root is the <span class=\"success\">smallest of the large numbers</span>. The median is either the max-heap root (odd count) or the average of both roots (even count).","actions":[{"type":"update","target":"status7","props":{"text":"Rule: max-heap.size >= min-heap.size (differ by at most 1)"}}]},{"description":"Process stream[0] = 5","actions":[{"type":"update","target":"i0","props":{"fill":"$warning"}},{"type":"update","target":"status7","props":{"text":"Processing element: 5"}}]},{"description":"Add 5 to max-heap (smaller half)","actions":[{"type":"update","target":"i0","props":{"fill":"$primary"}},{"type":"update","target":"lmaxc","props":{"text":"[5]"}},{"type":"update","target":"status7","props":{"text":"5 <= max-heap root (or heap empty) → add to max-heap"}}]},{"description":"Median after 1 elements: 5","actions":[{"type":"update","target":"i0","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"lmed","props":{"text":"Median: 5"}},{"type":"update","target":"status7","props":{"text":"After 1 element: median = 5 | Max-heap: [5] | Min-heap: []"}}]},{"description":"Process stream[1] = 15","actions":[{"type":"update","target":"i1","props":{"fill":"$warning"}},{"type":"update","target":"status7","props":{"text":"Processing element: 15"}}]},{"description":"Add 15 to min-heap (larger half)","actions":[{"type":"update","target":"i1","props":{"fill":"$warning"}},{"type":"update","target":"lminc","props":{"text":"[15]"}},{"type":"update","target":"status7","props":{"text":"15 > max-heap root → add to min-heap"}}]},{"description":"Median after 2 elements: 10","actions":[{"type":"update","target":"i1","props":{"fill":"$success","stroke":"$success"}},{"type":"update","target":"lmed","props":{"text":"Median: 10"}},{"type":"update","target":"status7","props":{"text":"After 2 elements: median = 10 | Max-h e":"$success"}},{"type":"update","target":"lmed","props":{"text":"Median: 6"}},{"type":"update","target":"status7","props":{"text":"After 6 elements: median = 6 | Max-heap: [5, 3, 1] | Min-heap: [7, 8, 15]"}}]},{"description":"All elements processed. Two-heap approach gives O(log n) insertion and O(1) median.","annotation":"explanation","narration":"<span class=\"success\">Stream fully processed!</span> The two-heap approach ensures: <span class=\"highlight\">O(log n)</span> per insertion (heap insert + possible rebalance), <span class=\"highlight\">O(1)</span> median retrieval (just read heap roots). Total: <span class=\"success\">O(n log n)</span> for n elements. The key invariant: max-heap and min-heap sizes differ by at most 1, and every element in max-heap is less than or equal to every element in min-heap.","phase":"cleanup","actions":[{"type":"update","target":"status7","props":{"text":"Final median: 6 | O(log n) per insert, O(1) median query"}},{"type":"update","target":"lmed","props":{"text":"Median: 6 (final)"}}]}]},"find-middle-linked-list":{"version":"1.0","metadata":{"algorithm":"find_middle_linked_list","title":"Find Middle of Linked List — Slow & Fast Pointers","description":"Using Floyd's tortoise and hare approach to find the middle node in one pass.","category":"linked-list","difficulty":"beginner","complexity":{"time":"O(n)","space":"O(1)"},"inputDescription":"Linked list: 1 → 2 → 3 → 4 → 5"},"actors":[{"id":"ll0","type":"node","x":300,"y":300,"value":1,"radius":25},{"id":"ll1","type":"node","x":400,"y":300,"value":2,"radius":25},{"id":"ll2","type":"node","x":500,"y":300,"value":3,"radius":25},{"id":"ll3","type":"node","x":600,"y":300,"value":4,"radius":25},{"id":"ll4","type":"node","x":700,"y":300,"value":5,"radius":25},{"id":"le5","type":"edge","source":"ll0","target":"ll1","directed":true},{"id":"le6","type":"edge","source":"ll1","target":"ll2","directed":true},{"id":"le7","type":"edge","source":"ll2","target":"ll3","directed":true},{"id":"le8" <script>

// AlgoViz Artifact Player v2 — Premium visual quality
(function(){"use strict";

const D = {
  canvas: { width: 1000, height: 600, padding: 40, background: "#FAFAFA" },
  theme: {
    default: "#FFFFFF", primary: "#2563EB", secondary: "#7C3AED",
    success: "#16A34A", warning: "#CA8A04", danger: "#DC2626",
    text: "#1A1A1A", muted: "#9CA3AF"
  },
  playback: { stepDuration: 800, autoPlay: false }
};

const SPEEDS = [0.25, 0.5, 1, 1.5, 2, 3];
const NS = "http://www.w3.org/2000/svg";

// ─── State Engine ────────────────────────────────────────

class Engine {
  constructor(v) {
    this.viz = v;
    this.config = this._mc(v.config || {});
    this.totalSteps = v.steps.length;
    this.currentStep = -1;
    this.actorStates = new Map();
    this._init();
  }

  _mc(c) {
    return {
      canvas: { ...D.canvas, ...(c.canvas || {}) },
      theme: { ...D.theme, ...(c.theme || {}) },
      playback: { ...D.playback, ...(c.playback || {}) }
    };
  }

  _init() {
    this.actorStates.clear();
    for (const a of this.viz.actors) this.actorStates.set(a.id, { ...a });
    this.currentStep = -1;
  }

  resolveColor(c) {
    if (!c) return null;
    if (typeof c === "string" && c.startsWith("$"))
      return this.config.theme[c.slice(1)] || c;
    return c;
  }

  _apply(actions) {
    for (const a of actions) {
      if (a.type === "update") {
        const s = this.actorStates.get(a.target);
        if (s) Object.assign(s, a.props);
      } else if (a.type === "create") {
        this.actorStates.set(a.actor.id, { ...a.actor });
      } else if (a.type === "remove") {
        this.actorStates.delete(a.target);
      }
    }
  }

  goToStep(n) {
    n = Math.max(-1, Math.min(n, this.totalSteps - 1));
    this._init();
    for (let i = 0; i <= n; i++) this._apply(this.viz.steps[i].actions);
    this.currentStep = n;
    return this.getScene();
  }

  nextStep() { return this.currentStep < this.totalSteps - 1 ? this.goToStep(this.currentStep + 1) : null; }
  prevStep() { return this.currentStep >= 0 ? this.goToStep(this.currentStep - 1) : null; }

  getScene() {
    // Determine which actors changed in this step
    const changedIds = new Set();
    if (this.currentStep >= 0) {
      for (const a of this.viz.steps[this.currentStep].actions) {
        if (a.type === "update") changedIds.add(a.target);
        else if (a.type === "create") changedIds.add(a.actor.id);
      }
    }
    const curStep = this.currentStep >= 0 ? this.viz.steps[this.currentStep] : null;
    return {
      stepIndex: this.currentStep,
      description: curStep ? curStep.description : (this.viz.metadata.description || ""),
      narration: curStep?.narration || null,
      phase: curStep?.phase || null,
      annotation: curStep?.annotation || null,
      transition: curStep ? (curStep.transition || "smooth") : "instant",
      actors: new Map(this.actorStates),
      changedIds,
    };
  }

  get atEnd() { return this.currentStep >= this.totalSteps - 1; }
  get atStart() { return this.currentStep <= -1; }
}

// ─── SVG Renderer ────────────────────────────────────────

class Renderer {
  constructor(c, e) {
    this.container = c;
    this.engine = e;
    this.svg = null;
    this.elements = new Map();
    this.defs = null;
  }

  init() {
    const cfg = this.engine.config.canvas;
    this.svg = this._el("svg", {
      viewBox: `0 0 ${cfg.width} ${cfg.height}`,
      preserveAspectRatio: "xMidYMid meet"
    });

    // Definitions: arrow marker, filters, gradients
    this.defs = this._el("defs");

    // Arrow marker
    const m = this._el("marker", {
      id: "av-arrow", viewBox: "0 0 10 10",
      refX: 9, refY: 5, markerWidth: 8, markerHeight: 8,
      orient: "auto-start-reverse"
    });
    m.appendChild(this._el("path", { d: "M 0 0 L 10 5 L 0 10 z", fill: "currentColor" }));
    this.defs.appendChild(m);

    // Subtle drop shadow for cells/nodes
    const shadowFilter = this._el("filter", { id: "av-shadow", x: "-5%", y: "-5%", width: "115%", height: "120%" });
    const feFlood = this._el("feFlood", { "flood-color": "rgba(0,0,0,0.06)", result: "flood" });
    const feComposite = this._el("feComposite", { in: "flood", in2: "SourceGraphic", operator: "in", result: "shadow" });
    const feOffset = this._el("feGaussianBlur", { in: "shadow", stdDeviation: "2", result: "blur" });
    const feOff = this._el("feOffset", { in: "blur", dx: "0", dy: "1", result: "offsetBlur" });
    const feMerge = this._el("feMerge");
    feMerge.appendChild(this._el("feMergeNode", { in: "offsetBlur" }));
    feMerge.appendChild(this._el("feMergeNode", { in: "SourceGraphic" }));
    shadowFilter.appendChild(feFlood);
    shadowFilter.appendChild(feComposite);
    shadowFilter.appendChild(feOffset);
    shadowFilter.appendChild(feOff);
    shadowFilter.appendChild(feMerge);
    this.defs.appendChild(shadowFilter);

    this.svg.appendChild(this.defs);

    // Background
    const bg = this._el("rect", {
      x: 0, y: 0, width: cfg.width, height: cfg.height,
      fill: cfg.background, class: "av-bg"
    });
    this.svg.appendChild(bg);

    // Layers
    this.regionLayer = this._el("g", { class: "av-layer-regions" });
    this.edgeLayer = this._el("g", { class: "av-layer-edges" });
    this.actorLayer = this._el("g", { class: "av-layer-actors" });
    this.svg.appendChild(this.regionLayer);
    this.svg.appendChild(this.edgeLayer);
    this.svg.appendChild(this.actorLayer);

    this.container.appendChild(this.svg);
    this.render(this.engine.getScene());
  }

  render(scene) {
    this.svg.classList.remove("av-transition-instant", "av-transition-swap", "av-transition-smooth", "av-transition-highlight", "av-transition-fade");
    if (scene.transition === "instant") this.svg.classList.add("av-transition-instant");
    else if (scene.transition === "swap") this.svg.classList.add("av-transition-swap");
    else if (scene.transition === "highlight") this.svg.classList.add("av-transition-highlight");
    else if (scene.transition === "fade") this.svg.classList.add("av-transition-fade");

    const ids = new Set(scene.actors.keys());
    for (const [id, el] of this.elements) {
      if (!ids.has(id)) {
        const g = el.group;
        if (scene.transition === "instant") {
          g.remove();
        } else {
          g.classList.add("av-exiting");
          g.addEventListener("animationend", () => g.remove(), { once: true });
        }
        this.elements.delete(id);
      }
    }
    for (const [id, actor] of scene.actors) {
      if (this.elements.has(id)) this._update(id, actor, scene);
      else this._create(actor, scene);
    }

    // Mark changed actors for highlight/flash transitions
    for (const [id, el] of this.elements) {
      if (scene.changedIds && scene.changedIds.has(id)) {
        el.group.dataset.changed = "true";
      } else {
        delete el.group.dataset.changed;
      }
    }

    // Apply action delays as CSS transition-delay for staggered animations
    if (scene.stepIndex >= 0) {
      const step = this.engine.viz.steps[scene.stepIndex];
      if (step) {
        for (const action of step.actions) {
          if (!action.delay) continue;
          const id = action.type === "create" ? action.actor?.id : action.target;
          if (!id) continue;
          const el = this.elements.get(id);
          if (!el) continue;
          const shapes = el.group.querySelectorAll("rect, circle, line, polygon, text");
          const d = `${action.delay}ms`;
          shapes.forEach(s => s.style.transitionDelay = d);
          el.group.style.transitionDelay = d;
          setTimeout(() => {
            shapes.forEach(s => s.style.transitionDelay = "0ms");
            el.group.style.transitionDelay = "0ms";
          }, action.delay + 800);
        }
      }
    }
  }

  _create(a, scene) {
    const g = this._el("g", { class: "av-actor", "data-id": a.id });
    const entry = { group: g, type: a.type };
    this.elements.set(a.id, entry);
    const rc = this._rc;

    switch (a.type) {
      case "cell": {
        const w = a.width || 60, h = a.height || 60;
        const fill = rc(a.fill, "$default");
        entry.rect = this._add(g, "rect", {
          x: a.x, y: a.y, width: w, height: h,
          rx: a.cornerRadius ?? 6, ry: a.cornerRadius ?? 6,
          fill: fill,
          stroke: rc(a.stroke, "$muted"), "stroke-width": a.strokeWidth ?? 1,
          opacity: a.opacity ?? 1,
          filter: "url(#av-shadow)"
        });
        // Value text (monospace for numbers)
        entry.label = this._addText(g, a.x + w / 2, a.y + h / 2,
          a.label ?? String(a.value), {
            fill: rc(a.textColor, "$text"),
            "font-size": a.fontSize || 18,
            "font-weight": "700",
            "font-family": "'JetBrains Mono', monospace"
          });
        // Sublabel (index)
        if (a.sublabel) {
          entry.sublabel = this._addText(g, a.x + w / 2, a.y + h + 18,
            a.sublabel, {
              fill: rc(null, "$muted"),
              "font-size": 11,
              "font-family": "'JetBrains Mono', monospace",
              opacity: 0.7
            });
        }
        break;
      }
      case "node": {
        const r = a.radius || 25;
        const fill = rc(a.fill, "$default");
        entry.circle = this._add(g, "circle", {
          cx: a.x, cy: a.y, r,
          fill: fill,
          stroke: rc(a.stroke, "$muted"), "stroke-width": a.strokeWidth ?? 2,
          opacity: a.opacity ?? 1,
          filter: "url(#av-shadow)"
        });
        entry.label = this._addText(g, a.x, a.y,
          a.label ?? String(a.value), {
            fill: rc(a.textColor, "$text"),
            "font-size": a.fontSize || 15,
            "font-weight": "700"
          });
        if (a.sublabel) {
          entry.sublabel = this._addText(g, a.x, a.y + r + 20,
            a.sublabel, { fill: rc(null, "$muted"), "font-size": 12 });
        }
        break;
      }
      case "edge": {
        const { x1, y1, x2, y2 } = this._ec(a, scene);
        entry.line = this._add(g, "line", {
          x1, y1, x2, y2,
          stroke: rc(a.stroke, "$muted"),
          "stroke-width": a.strokeWidth ?? 2,
          "stroke-linecap": "round",
          "stroke-dasharray": a.dashArray || "",
          opacity: a.opacity ?? 0.6,
          "marker-end": a.directed ? "url(#av-arrow)" : ""
        });
        g.style.color = rc(a.stroke, "$muted");
        const t = a.label || (a.weight != null ? String(a.weight) : "");
        if (t) {
          entry.midLabel = this._addText(g,
            (x1 + x2) / 2, (y1 + y2) / 2 - 12, t, {
              fill: rc(null, "$text"), "font-size": 12, "font-weight": "600",
              "font-family": "'JetBrains Mono', monospace"
            });
        }
        break;
      }
      case "pointer": {
        const { px, py, tx, ty } = this._pc(a, scene);
        entry.tri = this._add(g, "polygon", {
          points: this._tp(a.position, tx, ty),
          fill: rc(a.fill, "$primary")
        });
        entry.label = this._addText(g, px, py, a.label || "", {
          fill: rc(a.textColor, "$primary"),
          "font-size": a.fontSize || 13,
          "font-weight": "700",
          "font-family": "'JetBrains Mono', monospace"
        });
        g.setAttribute("opacity", a.opacity ?? 1);
        break;
      }
      case "label": {
        entry.text = this._addText(g, a.x, a.y, a.text, {
          "text-anchor": a.anchor || "start",
          fill: rc(a.fill, "$text"),
          "font-size": a.fontSize || 16,
          "font-weight": a.fontWeight || "normal",
          opacity: a.opacity ?? 1
        });
        break;
      }
      case "region": {
        entry.rect = this._add(g, "rect", {
          x: a.x, y: a.y, width: a.width, height: a.height,
          rx: a.cornerRadius ?? 10,
          fill: rc(a.fill, "$success"),
          stroke: rc(a.stroke, "$success"),
          "stroke-width": a.strokeWidth ?? 1.5,
          opacity: a.opacity ?? 0.12,
          "stroke-dasharray": "4 2"
        });
        if (a.label) {
          entry.label = this._addText(g,
            a.x + a.width / 2, a.y + a.height / 2, a.label, {
              fill: rc(a.stroke, "$success"),
              "font-size": 13, "font-weight": "600", opacity: 0.7
            });
        }
        break;
      }
    }

    const layer = a.type === "edge" ? this.edgeLayer
      : a.type === "region" ? this.regionLayer
      : this.actorLayer;
    layer.appendChild(g);

    // Entrance animation for mid-visualization creates (skip initial render)
    if (scene.stepIndex >= 0 && scene.transition !== "instant") {
      const cx = a.type === "node" ? a.x : (a.x + (a.width || 60) / 2);
      const cy = a.type === "node" ? a.y : (a.y + (a.height || 60) / 2);
      g.style.transformOrigin = `${cx}px ${cy}px`;
      g.classList.add("av-entering");
      g.addEventListener("animationend", () => g.classList.remove("av-entering"), { once: true });
    }
  }

  _update(id, a, scene) {
    const e = this.elements.get(id);
    const rc = this._rc;
    const changed = scene.changedIds && scene.changedIds.has(id);

    switch (a.type) {
      case "cell": {
        const w = a.width || 60, h = a.height || 60;
        const fill = rc(a.fill, "$default");
        const isActive = fill && fill !== rc(null, "$default") && fill !== rc(null, "$success");
        this._sa(e.rect, {
          x: a.x, y: a.y, width: w, height: h,
          rx: a.cornerRadius ?? 6, ry: a.cornerRadius ?? 6,
          fill: fill,
          stroke: rc(a.stroke, "$muted"), "stroke-width": a.strokeWidth ?? 1,
          opacity: a.opacity ?? 1,
          filter: "url(#av-shadow)"
        });
        this._sa(e.label, {
          x: a.x + w / 2, y: a.y + h / 2,
          fill: rc(a.textColor, "$text"), "font-size": a.fontSize || 18
        });
        e.label.textContent = a.label ?? String(a.value);
        if (e.sublabel) {
          this._sa(e.sublabel, { x: a.x + w / 2, y: a.y + h + 18 });
          if (a.sublabel !== undefined) e.sublabel.textContent = a.sublabel;
        }
        break;
      }
      case "node": {
        const r = a.radius || 25;
        const fill = rc(a.fill, "$default");
        const isActive = fill && fill !== rc(null, "$default") && fill !== rc(null, "$success");
        this._sa(e.circle, {
          cx: a.x, cy: a.y, r,
          fill: fill,
          stroke: rc(a.stroke, "$muted"), "stroke-width": a.strokeWidth ?? 2,
          opacity: a.opacity ?? 1,
          filter: "url(#av-shadow)"
        });
        this._sa(e.label, {
          x: a.x, y: a.y,
          fill: rc(a.textColor, "$text"), "font-size": a.fontSize || 15
        });
        e.label.textContent = a.label ?? String(a.value);
        if (e.sublabel) {
          this._sa(e.sublabel, { x: a.x, y: a.y + r + 20 });
          if (a.sublabel !== undefined) e.sublabel.textContent = a.sublabel;
        }
        break;
      }
      case "edge": {
        const { x1, y1, x2, y2 } = this._ec(a, scene);
        const stroke = rc(a.stroke, "$muted");
        const sw = a.strokeWidth ?? 2;
        const isHighlighted = sw > 2;
        this._sa(e.line, {
          x1, y1, x2, y2,
          stroke: stroke,
          "stroke-width": sw,
          "stroke-linecap": "round",
          "stroke-dasharray": a.dashArray || "",
          opacity: isHighlighted ? 1 : (a.opacity ?? 0.6),
          "marker-end": a.directed ? "url(#av-arrow)" : ""
        });
        e.group.style.color = stroke;
        if (e.midLabel) {
          this._sa(e.midLabel, {
            x: (x1 + x2) / 2, y: (y1 + y2) / 2 - 12,
            fill: rc(null, "$text")
          });
        }
        break;
      }
      case "pointer": {
        const { px, py, tx, ty } = this._pc(a, scene);
        this._sa(e.tri, { points: this._tp(a.position, tx, ty), fill: rc(a.fill, "$primary") });
        this._sa(e.label, {
          x: px, y: py,
          fill: rc(a.textColor, "$primary"), "font-size": a.fontSize || 13
        });
        e.label.textContent = a.label || "";
        e.group.setAttribute("opacity", a.opacity ?? 1);
        break;
      }
      case "label": {
        this._sa(e.text, {
          x: a.x, y: a.y, "text-anchor": a.anchor || "start",
          fill: rc(a.fill, "$text"),
          "font-size": a.fontSize || 16,
          "font-weight": a.fontWeight || "normal",
          opacity: a.opacity ?? 1
        });
        e.text.textContent = a.text;
        break;
      }
      case "region": {
        this._sa(e.rect, {
          x: a.x, y: a.y, width: a.width, height: a.height,
          rx: a.cornerRadius ?? 10,
          fill: rc(a.fill, "$success"),
          stroke: rc(a.stroke, "$success"),
          "stroke-width": a.strokeWidth ?? 1.5,
          opacity: a.opacity ?? 0.12
        });
        if (e.label) {
          this._sa(e.label, {
            x: a.x + a.width / 2, y: a.y + a.height / 2,
            fill: rc(a.stroke, "$success")
          });
          if (a.label !== undefined) e.label.textContent = a.label;
        }
        break;
      }
    }
  }

  _ec(a, scene) {
    const src = scene.actors.get(a.source), tgt = scene.actors.get(a.target);
    if (!src || !tgt) return { x1: 0, y1: 0, x2: 0, y2: 0 };
    let x1, y1, x2, y2;
    if (src.type === "node") { x1 = src.x; y1 = src.y; }
    else { x1 = src.x + (src.width || 60) / 2; y1 = src.y + (src.height || 60) / 2; }
    if (tgt.type === "node") { x2 = tgt.x; y2 = tgt.y; }
    else { x2 = tgt.x + (tgt.width || 60) / 2; y2 = tgt.y + (tgt.height || 60) / 2; }
    if (a.directed && tgt.type === "node") {
      const r = tgt.radius || 25;
      const dx = x2 - x1, dy = y2 - y1, d = Math.sqrt(dx * dx + dy * dy);
      if (d > 0) { x2 -= (dx / d) * r; y2 -= (dy / d) * r; }
    }
    return { x1, y1, x2, y2 };
  }

  _pc(a, scene) {
    const t = scene.actors.get(a.target);
    if (!t) return { px: 0, py: 0, tx: 0, ty: 0 };
    let cx, cy, o;
    if (t.type === "node") { cx = t.x; cy = t.y; o = (t.radius || 25) + 12; }
    else if (t.type === "cell") { cx = t.x + (t.width || 60) / 2; cy = t.y + (t.height || 60) / 2; o = (t.height || 60) / 2 + 12; }
    else { cx = t.x || 0; cy = t.y || 0; o = 22; }
    const p = a.position; let px, py, tx, ty;
    if (p === "above") { tx = cx; ty = cy - o; px = cx; py = ty - 18; }
    else if (p === "below") { tx = cx; ty = cy + o; px = cx; py = ty + 18; }
    else if (p === "left") { tx = cx - o; ty = cy; px = tx - 18; py = cy; }
    else { tx = cx + o; ty = cy; px = tx + 18; py = cy; }
    return { px, py, tx, ty };
  }

  _tp(p, tx, ty) {
    const s = 6;
    if (p === "above") return `${tx},${ty+s} ${tx-s},${ty-s} ${tx+s},${ty-s}`;
    if (p === "below") return `${tx},${ty-s} ${tx-s},${ty+s} ${tx+s},${ty+s}`;
    if (p === "left") return `${tx+s},${ty} ${tx-s},${ty-s} ${tx-s},${ty+s}`;
    return `${tx-s},${ty} ${tx+s},${ty-s} ${tx+s},${ty+s}`;
  }

  get _rc() { return (v, f) => { const c = v ?? f; return this.engine.resolveColor(c); }; }

  _el(t, a) {
    const e = document.createElementNS(NS, t);
    if (a) this._sa(e, a);
    return e;
  }

  _sa(e, a) {
    const CSS_PROPS = new Set(["fill", "stroke", "opacity", "stroke-width"]);
    const CSS_LINE = new Set(["x1", "y1", "x2", "y2"]);
    const isLine = e.tagName === "line";
    for (const [k, v] of Object.entries(a)) {
      if (v === undefined || v === null) continue;
      if (CSS_PROPS.has(k)) {
        e.style[k === "stroke-width" ? "strokeWidth" : k] = String(v);
      } else if (isLine && CSS_LINE.has(k)) {
        e.style[k] = String(v);
      } else {
        e.setAttribute(k, String(v));
      }
    }
  }

  _add(g, t, a) { const e = this._el(t, a); g.appendChild(e); return e; }

  _addText(g, x, y, text, extra) {
    const e = this._el("text", {
      x, y, "text-anchor": "middle", "dominant-baseline": "central",
      "font-family": "inherit", ...extra
    });
    e.textContent = text;
    g.appendChild(e);
    return e;
  }
}

// ─── Player UI ───────────────────────────────────────────

class Player {
  constructor(container, viz) {
    this.root = typeof container === "string" ? document.querySelector(container) : container;
    this.engine = new Engine(viz);
    this.renderer = null;
    this.playing = false;
    this.timer = null;
    this.speed = 1;
    this._build();
    this._bind();
    if (this.engine.config.playback.autoPlay) this.play();
  }

  _build() {
    this.root.innerHTML = "";
    const viz = this.engine.viz, meta = viz.metadata;

    // Header
    const header = this._div("av-header");
    const h1 = document.createElement("h1");
    h1.textContent = meta.title;
    header.appendChild(h1);
    const metaDiv = this._div("av-meta");
    if (meta.category) {
      const b = document.createElement("span");
      b.className = "av-badge av-badge-accent";
      b.textContent = meta.category;
      metaDiv.appendChild(b);
    }
    if (meta.complexity?.time) {
      const b = document.createElement("span");
      b.className = "av-badge";
      b.textContent = meta.complexity.time;
      metaDiv.appendChild(b);
    }
    if (meta.difficulty) {
      const b = document.createElement("span");
      b.className = "av-badge";
      b.textContent = meta.difficulty;
      metaDiv.appendChild(b);
    }
    header.appendChild(metaDiv);
    this.root.appendChild(header);

    // Canvas
    const main = this._div("av-main");
    const cw = this._div("av-canvas-wrap");
    main.appendChild(cw);
    this.root.appendChild(main);

    // Description
    const desc = this._div("av-description");
    this.descStep = document.createElement("span");
    this.descStep.className = "av-description-step";
    this.annotationBadge = document.createElement("span");
    this.annotationBadge.className = "av-annotation-badge";
    this.annotationBadge.style.display = "none";
    this.phaseBadge = document.createElement("span");
    this.phaseBadge.className = "av-phase-badge";
    this.phaseBadge.style.display = "none";
    this.descText = document.createElement("span");
    this.descText.className = "av-description-text";
    desc.appendChild(this.descStep);
    desc.appendChild(this.annotationBadge);
    desc.appendChild(this.phaseBadge);
    desc.appendChild(this.descText);
    this.root.appendChild(desc);

    // Controls
    const ctrl = this._div("av-controls");
    this.btnPrev = this._btn("◀", "av-btn", "Previous (←)");
    this.btnPlay = this._btn("▶", "av-btn av-btn-play", "Play/Pause (Space)");
    this.btnNext = this._btn("▶", "av-btn", "Next (→)");
    this.timeline = document.createElement("input");
    this.timeline.type = "range";
    this.timeline.className = "av-timeline";
    this.timeline.min = -1;
    this.timeline.max = this.engine.totalSteps - 1;
    this.timeline.value = -1;
    // Speed segmented control
    const speedGroup = this._div("av-speed-group");
    this.speedBtns = {};
    for (const s of [0.5, 1, 2]) {
      const b = document.createElement("button");
      b.className = "av-speed-seg" + (s === 1 ? " active" : "");
      b.textContent = s + "×";
      b.addEventListener("click", () => {
        this.speed = s;
        Object.values(this.speedBtns).forEach(btn => btn.classList.remove("active"));
        b.classList.add("active");
      });
      speedGroup.appendChild(b);
      this.speedBtns[s] = b;
    }
    this.stepCount = document.createElement("span");
    this.stepCount.className = "av-step-count";

    // Wrap timeline with phase markers
    const timelineWrap = this._div("av-timeline-wrap");
    timelineWrap.appendChild(this.timeline);
    const phaseMarkers = this._div("av-phase-markers");
    let lastPhase = null;
    const total = this.engine.totalSteps;
    for (let i = 0; i < total; i++) {
      const step = this.engine.viz.steps[i];
      if (step.phase && step.phase !== lastPhase) {
        const pct = ((i + 1) / total) * 100;
        const tick = document.createElement("div");
        tick.className = "av-phase-tick";
        tick.style.left = `${pct}%`;
        tick.title = step.phase;
        phaseMarkers.appendChild(tick);
        lastPhase = step.phase;
      }
    }
    timelineWrap.appendChild(phaseMarkers);

    [this.btnPrev, this.btnPlay, this.btnNext, timelineWrap, speedGroup, this.stepCount]
      .forEach(e => ctrl.appendChild(e));
    this.root.appendChild(ctrl);

    // Keyboard shortcut hints (auto-dismiss)
    const hints = this._div("av-kbd-hints");
    hints.innerHTML = '<span><kbd>Space</kbd> Play</span><span><kbd>←</kbd><kbd>→</kbd> Step</span><span><kbd>Home</kbd><kbd>End</kbd> Jump</span>';
    cw.appendChild(hints);
    const dismissHints = () => {
      hints.classList.add("av-kbd-fade");
      hints.addEventListener("animationend", () => hints.remove(), { once: true });
    };
    setTimeout(dismissHints, 4000);
    document.addEventListener("keydown", dismissHints, { once: true });

    // Init renderer
    this.renderer = new Renderer(cw, this.engine);
    this.renderer.init();
    this._updateUI();
  }

  _bind() {
    this.btnPlay.addEventListener("click", () => this.togglePlay());
    this.btnPrev.addEventListener("click", () => { this.pause(); this._step(-1); });
    this.btnNext.addEventListener("click", () => { this.pause(); this._step(1); });
    this.timeline.addEventListener("input", () => {
      this.pause();
      const s = this.engine.goToStep(parseInt(this.timeline.value));
      this.renderer.render(s);
      this._updateUI();
    });
    document.addEventListener("keydown", (e) => {
      if (e.target.tagName === "INPUT" && e.target.type !== "range") return;
      switch (e.key) {
        case " ": e.preventDefault(); this.togglePlay(); break;
        case "ArrowRight": e.preventDefault(); this.pause(); this._step(1); break;
        case "ArrowLeft": e.preventDefault(); this.pause(); this._step(-1); break;
        case "Home": e.preventDefault(); this.pause(); this.engine.goToStep(-1); this._render(); break;
        case "End": e.preventDefault(); this.pause(); this.engine.goToStep(this.engine.totalSteps - 1); this._render(); break;
      }
    });
  }

  togglePlay() { this.playing ? this.pause() : this.play(); }

  play() {
    if (this.engine.atEnd) { this.engine.goToStep(-1); this._render(); }
    this.playing = true;
    this.btnPlay.textContent = "⏸";
    this._tick();
  }

  pause() {
    this.playing = false;
    this.btnPlay.textContent = "▶";
    clearTimeout(this.timer);
  }

  _tick() {
    if (!this.playing) return;
    const s = this.engine.nextStep();
    if (s) {
      this.renderer.render(s);
      this._updateUI();
      // Per-step duration override
      const curStep = this.engine.viz.steps[this.engine.currentStep];
      const dur = curStep?.duration || this.engine.config.playback.stepDuration;
      this.timer = setTimeout(() => this._tick(), dur / this.speed);
    } else {
      this.pause();
    }
  }

  _step(d) {
    const s = d > 0 ? this.engine.nextStep() : this.engine.prevStep();
    if (s) { this.renderer.render(s); this._updateUI(); }
  }

  _render() { this.renderer.render(this.engine.getScene()); this._updateUI(); }

  _updateUI() {
    const s = this.engine.currentStep, t = this.engine.totalSteps;
    this.timeline.value = s;
    this.stepCount.textContent = `${s + 1} / ${t}`;
    const sc = this.engine.getScene();
    // Rich narration: use innerHTML with sanitization; fall back to textContent
    if (sc.narration) {
      this.descText.innerHTML = this._sanitize(sc.narration);
    } else {
      this.descText.textContent = sc.description;
    }
    this.descStep.textContent = s >= 0 ? `${s + 1}` : "";
    this.descStep.style.display = s >= 0 ? "" : "none";
    // Annotation badge
    if (sc.annotation) {
      this.annotationBadge.textContent = sc.annotation;
      this.annotationBadge.dataset.type = sc.annotation;
      this.annotationBadge.style.display = "";
    } else { this.annotationBadge.style.display = "none"; }
    // Phase badge
    if (sc.phase) {
      this.phaseBadge.textContent = sc.phase;
      this.phaseBadge.style.display = "";
    } else { this.phaseBadge.style.display = "none"; }
    // Annotation border
    const descPanel = this.descText.closest(".av-description");
    if (descPanel) {
      if (sc.annotation) { descPanel.dataset.annotation = sc.annotation; }
      else { delete descPanel.dataset.annotation; }
    }
  }

  _sanitize(html) {
    // Allow only safe inline tags; strip everything else
    const tmp = document.createElement("div");
    tmp.innerHTML = html;
    tmp.querySelectorAll("script,style,iframe,object,embed,form,input,link").forEach(e => e.remove());
    tmp.querySelectorAll("*").forEach(el => {
      for (const attr of [...el.attributes]) {
        if (attr.name === "class" || attr.name === "style") continue;
        if (attr.name.startsWith("on")) el.removeAttribute(attr.name);
      }
    });
    return tmp.innerHTML;
  }
  _div(c) { const d = document.createElement("div"); d.className = c; return d; }
  _btn(t, c, title) {
    const b = document.createElement("button"); b.className = c;
    b.textContent = t; if (title) b.title = title; return b;
  }
}

// ─── Public API ──────────────────────────────────────────

window.AlgoViz = {
  play(c, d) {
    const el = typeof c === "string" ? document.querySelector(c) : c;
    if (!el) throw new Error("AlgoViz: container not found");
    if (!d || d.version !== "1.0") throw new Error("AlgoViz: invalid visualization");
    return new Player(el, d);
  }
};

document.addEventListener("DOMContentLoaded", () => {
  const root = document.getElementById("algoviz-root");
  if (!root) return;
  const s = document.querySelector('script[type="application/algoviz"]');
  if (s) {
    try {
      const d = JSON.parse(s.textContent);
      root.style.display = "flex";
      root.style.flexDirection = "column";
      root.style.height = "100vh";
      AlgoViz.play(root, d);
    } catch (e) {
      root.innerHTML = '<div style="padding:40px;color:#DC2626;font-family:monospace">Error: ' + e.message + '</div>';
    }
  }
});

})();

</script>

  const allPill = document.createElement("span");
  allPill.className = "pg-cat-pill active";
  allPill.textContent = "All " + CATALOG.length;
  allPill.addEventListener("click", () => setCategory(null));
  catFilters.appendChild(allPill);

  const catOrder = ["sorting","searching","graph","tree","dynamic-programming","backtracking","linked-list","heap","string","hashing","other"];
  for (const cat of catOrder) {
    if (!CAT_STATS[cat]) continue;
    const pill = document.createElement("span");
    pill.className = "pg-cat-pill";
    pill.dataset.cat = cat;
    pill.textContent = (CAT_NAMES[cat] || cat) + " " + CAT_STATS[cat];
    pill.addEventListener("click", () => setCategory(cat));
    catFilters.appendChild(pill);
  }

  function setCategory(cat) {
    activeCategory = cat;
    catFilters.querySelectorAll(".pg-cat-pill").forEach(p => {
      if (cat === null) p.classList.toggle("active", !p.dataset.cat);
      else p.classList.toggle("active", p.dataset.cat === cat);
    });
    renderList();
  }

  searchInput.addEventListener("input", () => {
    searchQuery = searchInput.value.trim().toLowerCase();
    renderList();
  });

  function renderList() {
    algoList.innerHTML = "";
    let count = 0;
    for (const item of CATALOG) {
      if (activeCategory && item.category !== activeCategory) continue;
      if (searchQuery) {
        const haystack = (item.title + " " + item.category + " " + item.description + " " + item.difficulty).toLowerCase();
        if (!haystack.includes(searchQuery)) continue;
      }
      count++;
      const li = document.createElement("li");
      li.className = "pg-algo-item" + (currentAlgoId === item.id ? " active" : "");
      li.dataset.id = item.id;
      li.innerHTML =
        '<span class="algo-name">' + esc(item.title) + "</span>" +
        '<span class="algo-diff ' + item.difficulty + '">' + item.difficulty + "</span>";
      li.addEventListener("click", () => loadAlgorithm(item.id));
      algoList.appendChild(li);
    }
    shownCount.textContent = count;
    emptyState.style.display = count === 0 ? "block" : "none";
  }

  function loadAlgorithm(id) {
    const data = ALGORITHMS[id];
    if (!data) return;
    currentAlgoId = id;
    document.querySelectorAll(".pg-algo-item").forEach(el => {
      el.classList.toggle("active", el.dataset.id === id);
    });
    updateInfoPanel(data);
    loadPlayer(data);
    // Scroll active item into view
    const active = algoList.querySelector(".pg-algo-item.active");
    if (active) active.scrollIntoView({ block: "nearest" });
  }

  function updateInfoPanel(data) {
    const meta = data.metadata || {};
    const grid = document.getElementById("info-grid");
    let html = "";
    if (meta.category) html += infoItem("Category", esc(meta.category));
    if (meta.difficulty) html += infoItem("Difficulty", esc(meta.difficulty));
    const cx = meta.complexity;
    if (cx) {
      const time = typeof cx === "string" ? cx : cx.time;
      const space = typeof cx === "object" ? cx.space : null;
      if (time) html += infoItem("Time", esc(time));
      if (space) html += infoItem("Space", esc(space));
    }
    const input = meta.inputDescription || meta.input;
    if (input) html += '<div class="pg-info-item full"><div class="info-label">Input</div><div class="info-value">' + esc(input) + "</div></div>";
    if (meta.description) html += '<div class="pg-info-item full"><div class="info-label">Description</div><div class="info-value desc">' + esc(meta.description) + "</div></div>";
    grid.innerHTML = html;
  }

  function infoItem(label, value) {
    return '<div class="pg-info-item"><div class="info-label">' + label + '</div><div class="info-value">' + value + "</div></div>";
  }

  function loadPlayer(data) {
    const root = document.getElementById("player-root");
    if (currentPlayer) { currentPlayer = null; }
    root.innerHTML = "";
    try {
      currentPlayer = window.AlgoViz.play(root, data);
    } catch (e) {
      root.innerHTML = '<div style="padding:40px;color:var(--danger);font-family:var(--mono);font-size:13px;">Error: ' + esc(e.message) + "</div>";
    }
  }

  function esc(s) {
    if (!s) return "";
    const d = document.createElement("div"); d.textContent = String(s);
    return d.innerHTML;
  }

  renderList();
  if (CATALOG.length > 0) loadAlgorithm(CATALOG[0].id);
})();
</script>

</body>
</html>
